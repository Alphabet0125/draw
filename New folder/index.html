<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload File</title>
  <style>
    :root {
      --bg: #f7f5f2;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #6a6a6a;
      --accent: #ff8c42;
      --accent-2: #ffb367;
      --shadow: 0 12px 30px rgba(0,0,0,0.08);
      --border: rgba(0,0,0,0.06);
      --input-bg: #ffffff;
      --success: #2eaf6a;
    }
    :root.dark {
      --bg: #0f1115;
      --card: #151922;
      --text: #e8ecf4;
      --muted: #9aa4b5;
      --accent: #ff9b4f;
      --accent-2: #ffb86c;
      --shadow: 0 12px 30px rgba(0,0,0,0.45);
      --border: rgba(255,255,255,0.08);
      --input-bg: #111723;
      --success: #35c176;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter","Prompt",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(255,140,66,0.06), transparent 30%),
                  radial-gradient(circle at 80% 0%, rgba(255,140,66,0.07), transparent 28%),
                  var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 40px 16px;
      transition: background 0.35s ease, color 0.35s ease;
    }
    .card {
      width: min(520px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 28px 28px 32px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(6px);
      transition: background 0.35s ease, border 0.35s ease, box-shadow 0.35s ease;
    }
    .accent-ring {
      position: absolute;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(255,140,66,0.18), rgba(255,140,66,0));
      top: -60px; right: -60px;
      pointer-events: none;
      filter: blur(8px);
    }
    .header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { margin: 0; font-weight: 700; letter-spacing: -0.02em; font-size: 1.35rem; }
    .muted { color: var(--muted); margin: 6px 0 0; font-size: 0.98rem; line-height: 1.5; }
    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      display: inline-flex; align-items: center; gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.35s ease, border 0.35s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }
    .theme-toggle:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,0.12); }
    form { margin-top: 22px; display: grid; gap: 14px; }
    label { font-weight: 600; font-size: 0.98rem; }
    .file-input {
      position: relative;
      border: 1px dashed var(--accent-2);
      background: color-mix(in srgb, var(--accent) 6%, transparent);
      padding: 18px 16px;
      border-radius: 14px;
      transition: border 0.25s ease, background 0.25s ease, transform 0.15s ease;
    }
    .file-input:hover {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      transform: translateY(-1px);
    }
    .file-input input[type="file"] { width: 100%; color: var(--text); cursor: pointer; }
    .helper { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
    button[type="submit"] {
      margin-top: 4px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-weight: 700;
      padding: 14px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 12px 28px rgba(255,140,66,0.28);
    }
    button[type="submit"]:hover { transform: translateY(-1.5px); box-shadow: 0 16px 36px rgba(255,140,66,0.35); filter: brightness(1.03); }
    button[type="submit"]:active { transform: translateY(0); box-shadow: 0 10px 20px rgba(255,140,66,0.32); }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border-radius: 999px;
      color: var(--text);
      font-weight: 600;
      border: 1px solid var(--border);
      margin-top: 8px;
    }
    .note { font-size: 0.9rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .toast {
      position: fixed; top: 16px; right: 16px;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--success);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent-ring"></div>
    <div class="header">
      <div>
        <h1>อัปโหลดไฟล์</h1>
        <p class="muted">รองรับไฟล์ JPG, PNG, PDF (สูงสุด 2MB)</p>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span id="themeIcon">🌞</span>
        <span id="themeLabel">Light</span>
      </button>
    </div>

    <form action="upload.php" method="post" enctype="multipart/form-data">
      <div class="badge">โฟลเดอร์ปลายทาง: <strong>uploads/</strong></div>

      <label for="file">เลือกไฟล์ของคุณ</label>
      <div class="file-input">
        <input type="file" id="file" name="file" required />
        <div class="helper">ไฟล์จะถูกบันทึกพร้อมเมทาดาทาและ Base64 ในฐานข้อมูล</div>
      </div>

      <button type="submit">อัปโหลด</button>
      <div class="note">หมายเหตุ: แนะนำให้เก็บรหัสผ่าน DB ในไฟล์สิ่งแวดล้อม (.env) และตั้งสิทธิ์โฟลเดอร์ uploads ไม่ให้รันสคริปต์ได้</div>
    </form>
  </div>

  <div class="toast" id="toast">อัปโหลดสำเร็จ!</div>

  <script>
    const root = document.documentElement;
    const toggleBtn = document.getElementById('themeToggle');
    const icon = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    const toast = document.getElementById('toast');

    // โหลดสถานะธีมจาก localStorage
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      root.classList.add('dark');
      icon.textContent = '🌙';
      label.textContent = 'Dark';
    }

    toggleBtn.addEventListener('click', () => {
      const isDark = root.classList.toggle('dark');
      icon.textContent = isDark ? '🌙' : '🌞';
      label.textContent = isDark ? 'Dark' : 'Light';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // แสดง toast เมื่อมีพารามิเตอร์ success=1
    const params = new URLSearchParams(window.location.search);
    if (params.get('success') === '1') {
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
      // เคลียร์ query string เพื่อไม่ให้ toast แสดงซ้ำเมื่อ refresh
      window.history.replaceState({}, '', window.location.pathname);
    }
  </script>
</body>
</html>
